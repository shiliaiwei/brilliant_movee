name: brilliant_movee
description: "Brilliant Movee — Replay. Analyze. Evolve. A premium chess analysis app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.2.0

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # UI & Animation
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  lottie: ^3.1.0

  # Icons & Fonts
  font_awesome_flutter: ^10.7.0
  google_fonts: ^6.2.1

  # Network & Data
  dio: ^5.4.3+1
  json_annotation: ^4.9.0

  # Local Storage
  hive_flutter: ^1.1.0
  sqflite: ^2.3.3+1
  path_provider: ^2.1.3

  # Chess Logic
  chess: ^0.8.1

  # Audio
  just_audio: ^0.9.40

  # FFI (Engine Bridge)
  ffi: ^2.1.3

  # Assets & Images
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1

  # Utilities
  intl: ^0.19.0
  connectivity_plus: ^6.0.3
  package_info_plus: ^8.0.2
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  json_serializable: ^6.7.1
  riverpod_generator: ^2.4.3
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/brand/logo.png"
  adaptive_icon_background: "#080C10"
  adaptive_icon_foreground: "assets/brand/logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/brand/
    - assets/boards/
    - assets/pieces/cburnett/
    - assets/pieces/alpha/
    - assets/pieces/merida/
    - assets/pieces/maestro/
    - assets/pieces/tatiana/
    - assets/pieces/staunty/
    - assets/pieces/california/
    - assets/pieces/pirouetti/
    - assets/sounds/
    - assets/data/

  # Fonts loaded via google_fonts package at runtime (SpaceGrotesk, Inter, JetBrainsMono).
