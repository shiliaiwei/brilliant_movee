<!DOCTYPE html>
<html lang="en">

<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">

  <!-- SEO & Branding -->
  <meta name="description" content="Stupid Brilliant — Replay. Analyze. Evolve. A premium chess analysis app powered by Stockfish 16.">
  <meta name="theme-color" content="#080C10">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Open Graph / Social -->
  <meta property="og:title" content="Stupid Brilliant">
  <meta property="og:description" content="Replay. Analyze. Evolve. Premium chess analysis.">
  <meta property="og:image" content="icons/Icon-512.png">
  <meta property="og:type" content="website">

  <!-- PWA -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Stupid Brilliant">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="manifest" href="manifest.json">

  <!-- Fonts (Matches AppTheme) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=JetBrains+Mono&family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <title>Stupid Brilliant — Chess Analysis</title>

  <style>
    :root {
      --bg-deep: #080C10;
      --bg-surface: #0E1620;
      --primary: #00E5C3;
      --secondary: #7B5EFF;
      --text-primary: #E8F4F0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background-color: var(--bg-deep);
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }

    /* Premium Loading Screen */
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, #0D1F1A 0%, #080C10 100%);
      z-index: 9999;
      transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeInScale 0.8s ease-out;
    }

    .logo-glow {
      position: relative;
      width: 100px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
      background: linear-gradient(135deg, rgba(0, 229, 195, 0.1), rgba(123, 94, 255, 0.1));
      border: 1px solid rgba(0, 229, 195, 0.2);
      animation: morphing 10s infinite alternate-reverse linear;
    }

    .logo-content {
      width: 50px;
      height: 50px;
      fill: var(--primary);
      filter: drop-shadow(0 0 10px rgba(0, 229, 195, 0.5));
    }

    .loading-title {
      margin-top: 40px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 6px;
      color: var(--text-primary);
      text-transform: uppercase;
      opacity: 0.9;
    }

    .loading-tagline {
      margin-top: 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--primary);
      text-transform: uppercase;
      opacity: 0.8;
    }

    .progress-track {
      margin-top: 48px;
      width: 160px;
      height: 2px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 40%;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      border-radius: 4px;
      animation: progress-slide 2s infinite ease-in-out;
    }

    @keyframes morphing {
      0% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }
      25% { border-radius: 58% 42% 75% 25% / 76% 46% 54% 24%; }
      50% { border-radius: 50% 50% 33% 67% / 55% 27% 73% 45%; }
      75% { border-radius: 33% 67% 58% 42% / 63% 68% 32% 37%; }
      100% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }
    }

    @keyframes progress-slide {
      0% { transform: translateX(-110%); }
      50% { transform: translateX(50%); }
      100% { transform: translateX(160%); }
    }

    @keyframes fadeInScale {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    /* Native-like Scrollbars */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg-deep);
    }
    ::-webkit-scrollbar-thumb {
      background: #1A2635;
      border-radius: 10px;
      border: 2px solid var(--bg-deep);
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #243447;
    }

    /* Selection Color */
    ::selection {
      background: rgba(0, 229, 195, 0.3);
      color: white;
    }
  </style>
</head>

<body>
  <div id="loading">
    <div class="loading-container">
      <div class="logo-glow">
        <!-- Chess King Icon -->
        <svg class="logo-content" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M19 22H5v-2h14v2M16.5 8.5c.83 0 1.5-.67 1.5-1.5S17.33 5.5 16.5 5.5 15 6.17 15 7s.67 1.5 1.5 1.5m-9 0C8.33 8.5 9 7.83 9 7s-.67-1.5-1.5-1.5S6 6.17 6 7s.67 1.5 1.5 1.5M12 1c-.55 0-1 .45-1 1v1H9v2h2v1.28C8.17 7.06 6 9.3 6 12v6h12v-6c0-2.7-2.17-4.94-5-5.28V5h2V3h-2V2c0-.55-.45-1-1-1z" />
        </svg>
      </div>
      <div class="loading-title">Stupid Brilliant</div>
      <div class="loading-tagline">Replay • Analyze • Evolve</div>
      <div class="progress-track">
        <div class="progress-fill"></div>
      </div>
    </div>
  </div>

  <script>
    window.addEventListener('load', function() {
      // Small delay to ensure smooth transition
      setTimeout(function() {
        if (!window._flutter) {
           // If flutter hasn't loaded yet, we stay on splash
        }
      }, 1000);
    });

    window.addEventListener('flutter-first-frame', function () {
      const loading = document.getElementById('loading');
      if (loading) {
        loading.classList.add('hidden');
        setTimeout(() => loading.remove(), 600);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
