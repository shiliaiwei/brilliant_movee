<!DOCTYPE html>
<html lang="en">

<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description"
    content="Brilliant Movee — Replay. Analyze. Evolve. Premium chess game analysis powered by Stockfish 16.">
  <meta name="theme-color" content="#080C10">

  <!-- Open Graph -->
  <meta property="og:title" content="Brilliant Movee">
  <meta property="og:description" content="Replay. Analyze. Evolve. Premium chess analysis.">
  <meta property="og:type" content="website">

  <!-- PWA -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Brilliant Movee">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="manifest" href="manifest.json">

  <title>Brilliant Movee — Chess Analysis</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background-color: #080C10;
      overflow: hidden;
    }

    /* Loading screen shown before Flutter initializes */
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #080C10 0%, #0D1F1A 100%);
      z-index: 9999;
      transition: opacity 0.4s ease;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-logo {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2px solid rgba(0, 229, 195, 0.4);
      box-shadow: 0 0 40px rgba(0, 229, 195, 0.3), 0 0 80px rgba(123, 94, 255, 0.15);
      animation: pulse 2s ease-in-out infinite;
      overflow: hidden;
      background: #141F2E;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .loading-logo svg {
      width: 40px;
      height: 40px;
      fill: #00E5C3;
    }

    .loading-title {
      margin-top: 24px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 4px;
      color: #E8F4F0;
    }

    .loading-tagline {
      margin-top: 8px;
      font-family: monospace;
      font-size: 12px;
      letter-spacing: 2px;
      color: #00E5C3;
    }

    .loading-bar {
      margin-top: 32px;
      width: 120px;
      height: 2px;
      background: rgba(0, 229, 195, 0.15);
      border-radius: 1px;
      overflow: hidden;
    }

    .loading-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #00E5C3, #7B5EFF);
      border-radius: 1px;
      animation: loading 1.8s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        box-shadow: 0 0 40px rgba(0, 229, 195, 0.3), 0 0 80px rgba(123, 94, 255, 0.15);
      }

      50% {
        box-shadow: 0 0 60px rgba(0, 229, 195, 0.5), 0 0 100px rgba(123, 94, 255, 0.25);
      }
    }

    @keyframes loading {
      0% {
        transform: translateX(-100%);
      }

      100% {
        transform: translateX(200%);
      }
    }

    /* Scrollbar styling for web */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #0E1620;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(0, 229, 195, 0.3);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 229, 195, 0.5);
    }

    /* Flutter canvas */
    flt-glass-pane {
      cursor: default;
    }
  </style>
</head>

<body>

  <!-- Loading screen -->
  <div id="loading">
    <div class="loading-logo">
      <!-- Chess king SVG placeholder -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path
          d="M19 22H5v-2h14v2M16.5 8.5c.83 0 1.5-.67 1.5-1.5S17.33 5.5 16.5 5.5 15 6.17 15 7s.67 1.5 1.5 1.5m-9 0C8.33 8.5 9 7.83 9 7s-.67-1.5-1.5-1.5S6 6.17 6 7s.67 1.5 1.5 1.5M12 1c-.55 0-1 .45-1 1v1H9v2h2v1.28C8.17 7.06 6 9.3 6 12v6h12v-6c0-2.7-2.17-4.94-5-5.28V5h2V3h-2V2c0-.55-.45-1-1-1z" />
      </svg>
    </div>
    <div class="loading-title">BRILLIANT MOVEE</div>
    <div class="loading-tagline">Replay. Analyze. Evolve.</div>
    <div class="loading-bar">
      <div class="loading-bar-fill"></div>
    </div>
  </div>

  <script>
    // Hide loading screen once Flutter is ready
    window.addEventListener('flutter-first-frame', function () {
      const loading = document.getElementById('loading');
      if (loading) {
        loading.classList.add('hidden');
        setTimeout(() => loading.remove(), 500);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
